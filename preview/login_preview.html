<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus - Login Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05080a;
            --bg-surface: rgba(13, 22, 28, 0.7);
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --secondary: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        body {
            background: radial-gradient(circle at top right, #0d2a21, #05080a);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            alignItems: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .glass {
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 8px 0 40px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #059669);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--primary-glow);
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px var(--primary-glow);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .forgot {
            display: block;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot:hover {
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="glass">
        <div class="logo">
            <h1>EduNexus</h1>
            <p>Plataforma Institucional Premium</p>
        </div>

        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="nombre@institucion.com">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" placeholder="••••••••">
        </div>

        <button>Iniciar Sesión</button>

        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

        <div class="footer">
            © 2026 EduNexus. Potencia Educativa de Nueva Generación.
        </div>
    </div>
</body>
</html>
