<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus Masterpiece Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --bg-glass: rgba(15, 23, 42, 0.75);
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.3);
            --secondary: #0ea5e9;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            --font-heading: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Aurora Background */
        .aurora-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .aurora-blob {
            position: absolute;
            width: 800px;
            height: 800px;
            background: var(--primary);
            filter: blur(140px);
            opacity: 0.15;
            border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }

        .aurora-blob:nth-child(2) {
            background: var(--secondary);
            right: -200px;
            top: -200px;
            opacity: 0.12;
            animation-delay: -7s;
        }

        .aurora-blob:nth-child(3) {
            background: var(--accent);
            left: -300px;
            bottom: -200px;
            opacity: 0.1;
            animation-delay: -14s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg) scale(1); }
            to { transform: translate(10%, 10%) rotate(20deg) scale(1.15); }
        }

        /* Masterpiece Glass Panel */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 32px;
            width: 100%;
            max-width: 440px;
            padding: 60px 50px;
            position: relative;
            z-index: 10;
            animation: slideIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .heading-premium {
            font-family: var(--font-heading);
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }

        .sub-heading {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 45px;
        }

        .input-group { margin-bottom: 25px; text-align: left; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .input-premium {
            width: 100%;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-premium:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .btn-premium {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), #059669);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: var(--font-heading);
            cursor: pointer;
            box-shadow: 0 12px 24px var(--primary-glow);
            transition: all 0.4s;
            margin-top: 15px;
        }

        .btn-premium:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 18px 32px var(--primary-glow);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 45px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .forgot {
            display: block;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .forgot:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="aurora-container">
        <div class="background-image"></div>
    </div>

    <div class="glass-panel">
        <div class="logo">
            <h1 class="heading-premium">EduNexus</h1>
            <p class="sub-heading">Innovación Educativa de Próxima Generación</p>
        </div>

        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" class="input-premium" placeholder="nombre@institucion.com">
        </div>

        <div class="input-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <label>Contraseña</label>
                <a href="#" class="forgot" style="margin-top: 0; font-size: 0.8rem;">¿Olvidaste tu contraseña?</a>
            </div>
            <input type="password" class="input-premium" placeholder="••••••••">
        </div>

        <button class="btn-premium">Entrar al Portal</button>

        <div class="footer">
            © 2026 EduNexus · Sistemas Inteligentes S.A.
        </div>
    </div>
</body>
</html>
